<!DOCTYPE html>
<html lang="en">
<head>

        #tooltip{position:fixed;display:none;pointer-events:none;z-index:100;background:rgba(10,10,20,0.88);backdrop-filter:blur(12px);border:1px solid rgba(100,200,255,0.25);border-radius:10px;padding:10px 16px;max-width:220px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}

    </style>
</head>
<body>
    <div id="info">Drag to orbit &bull; Scroll to zoom &bull; Hover objects to interact</div>
    <div id="tooltip"><div class="tt-name"></div><div class="tt-desc"></div></div>
    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ==================== SCENE ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1c24);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
camera.position.set(3, 2.4, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.12, 0.3, 0.93));
composer.addPass(new OutputPass());

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, -1.5);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 0.5;
controls.maxDistance = 10;
controls.update();

// Camera override via URL
const _p = new URLSearchParams(location.search).get('cam');
if (_p) { const v = _p.split(',').map(Number); camera.position.set(v[0],v[1],v[2]); controls.target.set(v[3],v[4],v[5]); controls.update(); }

// ==================== INTERACTIVITY ====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-10,-10);
const interactives = [];
let hovered = null, origEmissive = 0;
const tip = document.getElementById('tooltip');
const tipN = tip.querySelector('.tt-name'), tipD = tip.querySelector('.tt-desc');

function tag(m, name, desc) { m.userData = {name, desc}; interactives.push(m); return m; }
addEventListener('mousemove', e => { mouse.x = (e.clientX/innerWidth)*2-1; mouse.y = -(e.clientY/innerHeight)*2+1; tip.style.left=(e.clientX+16)+'px'; tip.style.top=(e.clientY-10)+'px'; });
addEventListener('click', () => { if(hovered){const p=new THREE.Vector3();hovered.getWorldPosition(p);controls.target.lerp(p,0.5);}});

// ==================== STATE ====================
const fans = [];
const clock = new THREE.Clock();

// MacBook GLB animation state
let macLidGroup, macScreenMat, macScreenLight;
let macLoaded = false, macLoadTime = 0;
let macLidAngle = Math.PI * 0.5; // start closed
const macLidTarget = -Math.PI * 0.2; // open angle

// ==================== HELPERS ====================
function rBox(w,h,d,r=0.01,s=3){return new RoundedBoxGeometry(w,h,d,s,r)}
function addM(g,m,x,y,z,cs=true,rs=true){const o=new THREE.Mesh(g,m);o.position.set(x,y,z);o.castShadow=cs;o.receiveShadow=rs;scene.add(o);return o}

// ==================== TEXTURES ====================
function woodTex(base, grain, reps) {
    const c = document.createElement('canvas'); c.width=c.height=512;
    const x = c.getContext('2d'); x.fillStyle=base; x.fillRect(0,0,512,512);
    for(let i=0;i<80;i++){const gc=parseInt(grain.slice(1),16);const r=((gc>>16)&255)+(Math.random()-.5)*30;const g=((gc>>8)&255)+(Math.random()-.5)*20;const b=(gc&255)+(Math.random()-.5)*15;x.strokeStyle=`rgba(${r},${g},${b},${.08+Math.random()*.12})`;x.lineWidth=.5+Math.random()*3;x.beginPath();const y2=Math.random()*512;x.moveTo(0,y2);for(let xx=0;xx<512;xx+=6)x.lineTo(xx,y2+Math.sin(xx*.012+Math.random()*.5)*5);x.stroke()}
    const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(reps,reps);return t;
}

function vscodeScreen() {
    const c = document.createElement('canvas'); c.width=640;c.height=400;
    const x = c.getContext('2d');
    x.fillStyle='#1e1e1e';x.fillRect(0,0,640,400);
    // Activity bar
    x.fillStyle='#333333';x.fillRect(0,0,44,400);
    x.fillStyle='#ffffff';x.fillRect(12,14,20,20);
    x.fillStyle='#808080';for(let i=1;i<5;i++)x.fillRect(12,14+i*36,20,20);
    // Sidebar
    x.fillStyle='#252526';x.fillRect(44,0,120,400);
    x.fillStyle='#cccccc';x.font='bold 10px monospace';x.fillText('EXPLORER',52,16);
    x.font='9px monospace';x.fillStyle='#bbbbbb';
    ['\u25BC src','    index.ts','    app.tsx','    utils.ts','\u25BC components','    Header.tsx','    Scene.tsx','\u25B6 styles','\u25B6 public'].forEach((f,i)=>{
        if(i===2){x.fillStyle='#264f78';x.fillRect(44,25+i*15,120,15);x.fillStyle='#ffffff'}else x.fillStyle='#bbbbbb';
        x.fillText(f,52,36+i*15);
    });
    // Tabs
    x.fillStyle='#2d2d2d';x.fillRect(164,0,476,26);
    x.fillStyle='#1e1e1e';x.fillRect(164,0,90,26);
    x.fillStyle='#007acc';x.fillRect(164,24,90,2);
    x.fillStyle='#ffffff';x.font='10px monospace';x.fillText('  app.tsx',172,16);
    x.fillStyle='#888888';x.fillText('  utils.ts',262,16);
    // Code - make it BRIGHT and readable
    const lines=[
        [{t:'import ',c:'#c586c0'},{t:'{ useState }',c:'#9cdcfe'},{t:' from ',c:'#c586c0'},{t:"'react'",c:'#ce9178'}],
        [{t:'import ',c:'#c586c0'},{t:'* as THREE',c:'#9cdcfe'},{t:' from ',c:'#c586c0'},{t:"'three'",c:'#ce9178'}],
        [{t:'import ',c:'#c586c0'},{t:'{ OrbitControls }',c:'#9cdcfe'},{t:' from ',c:'#c586c0'},{t:"'three/addons'",c:'#ce9178'}],
        [],
        [{t:'interface ',c:'#569cd6'},{t:'SceneConfig',c:'#4ec9b0'},{t:' {',c:'#d4d4d4'}],
        [{t:'  width',c:'#9cdcfe'},{t:': ',c:'#d4d4d4'},{t:'number',c:'#4ec9b0'}],
        [{t:'  height',c:'#9cdcfe'},{t:': ',c:'#d4d4d4'},{t:'number',c:'#4ec9b0'}],
        [{t:'}',c:'#d4d4d4'}],
        [],
        [{t:'export const ',c:'#569cd6'},{t:'Scene',c:'#dcdcaa'},{t:' = () => {',c:'#d4d4d4'}],
        [{t:'  const ',c:'#569cd6'},{t:'[scene]',c:'#9cdcfe'},{t:' = ',c:'#d4d4d4'},{t:'useState',c:'#dcdcaa'},{t:'(',c:'#d4d4d4'},{t:'null',c:'#569cd6'},{t:')',c:'#d4d4d4'}],
        [{t:'  const ',c:'#569cd6'},{t:'ref',c:'#9cdcfe'},{t:' = ',c:'#d4d4d4'},{t:'useRef',c:'#dcdcaa'},{t:'(null)',c:'#d4d4d4'}],
        [],
        [{t:'  // Initialize renderer',c:'#6a9955'}],
        [{t:'  useEffect',c:'#dcdcaa'},{t:'(() => {',c:'#d4d4d4'}],
        [{t:'    const ',c:'#569cd6'},{t:'cam',c:'#9cdcfe'},{t:' = new ',c:'#d4d4d4'},{t:'THREE',c:'#4ec9b0'},{t:'.PerspectiveCamera()',c:'#d4d4d4'}],
        [{t:'    const ',c:'#569cd6'},{t:'geo',c:'#9cdcfe'},{t:' = new ',c:'#d4d4d4'},{t:'THREE',c:'#4ec9b0'},{t:'.BoxGeometry(1,1,1)',c:'#d4d4d4'}],
        [{t:'    scene.add(mesh)',c:'#d4d4d4'}],
        [{t:'  }, [])',c:'#d4d4d4'}],
        [{t:'  return ',c:'#c586c0'},{t:'<canvas ',c:'#808080'},{t:'ref',c:'#9cdcfe'},{t:'={ref} />',c:'#808080'}],
        [{t:'}',c:'#d4d4d4'}],
    ];
    x.font='9px monospace';
    lines.forEach((ln,i)=>{
        x.fillStyle='#858585';x.fillText(String(i+1).padStart(3),169,42+i*14);
        let px=198;ln.forEach(tk=>{x.fillStyle=tk.c;x.fillText(tk.t,px,42+i*14);px+=x.measureText(tk.t).width});
    });
    // Status bar
    x.fillStyle='#007acc';x.fillRect(0,382,640,18);
    x.fillStyle='#ffffff';x.font='9px monospace';x.fillText(' main  \u2713  TypeScript  UTF-8  Ln 10, Col 28',8,394);
    // Minimap
    x.fillStyle='#252526';x.fillRect(600,26,40,356);
    for(let i=0;i<60;i++){x.fillStyle=`rgba(200,200,200,${.06+Math.random()*.1})`;x.fillRect(604,30+i*5,6+Math.random()*22,2)}
    return new THREE.CanvasTexture(c);
}

function termScreen() {
    const c = document.createElement('canvas'); c.width=640;c.height=400;
    const x = c.getContext('2d');
    x.fillStyle='#0c0c0c';x.fillRect(0,0,640,400);
    x.fillStyle='#1e1e1e';x.fillRect(0,0,640,24);
    x.fillStyle='#cccccc';x.font='10px monospace';x.fillText('  Terminal \u2013 bash',12,15);
    ['#ff5f56','#ffbd2e','#27c93f'].forEach((c2,i)=>{x.fillStyle=c2;x.beginPath();x.arc(590+i*18,12,5,0,Math.PI*2);x.fill()});
    const lines=[
        {p:'~ $ ',pc:'#27c93f',t:'npm run dev',tc:'#fff'},
        {p:'',pc:'',t:'',tc:''},
        {p:'  VITE v5.4.2  ready in ',pc:'#aaa',t:'284ms',tc:'#27c93f'},
        {p:'',pc:'',t:'',tc:''},
        {p:'  \u279C  Local:   ',pc:'#aaa',t:'http://localhost:5173/',tc:'#569cd6'},
        {p:'  \u279C  Network: ',pc:'#aaa',t:'http://192.168.1.42:5173/',tc:'#569cd6'},
        {p:'',pc:'',t:'',tc:''},
        {p:'\u2713 ',pc:'#27c93f',t:'47 modules transformed.',tc:'#aaa'},
        {p:'\u2713 ',pc:'#27c93f',t:'built in 1.1s',tc:'#aaa'},
        {p:'',pc:'',t:'',tc:''},
        {p:'~ $ ',pc:'#27c93f',t:'git log --oneline -5',tc:'#fff'},
        {p:'a3f21b8 ',pc:'#ffbd2e',t:'feat: add 3D workspace scene',tc:'#fff'},
        {p:'b92c4d1 ',pc:'#ffbd2e',t:'fix: lighting and shadows',tc:'#fff'},
        {p:'e18fa93 ',pc:'#ffbd2e',t:'refactor: components',tc:'#fff'},

    lines.forEach((l,i)=>{const y=44+i*18;if(l.p){x.fillStyle=l.pc;x.fillText(l.p,12,y)}if(l.t){x.fillStyle=l.tc;x.fillText(l.t,12+x.measureText(l.p).width,y)}});
    return new THREE.CanvasTexture(c);
}

function cityTex() {
    const c = document.createElement('canvas'); c.width=640;c.height=320;
    const x = c.getContext('2d');
    const g = x.createLinearGradient(0,0,0,320);
    g.addColorStop(0,'#080820');g.addColorStop(0.4,'#0c0c2a');g.addColorStop(1,'#1a1a40');
    x.fillStyle=g;x.fillRect(0,0,640,320);
    for(let i=0;i<150;i++){x.fillStyle=`rgba(255,255,255,${Math.random()*.7+.2})`;x.beginPath();x.arc(Math.random()*640,Math.random()*180,Math.random()*1.2,0,Math.PI*2);x.fill()}
    // Moon
    const mg=x.createRadialGradient(500,55,12,500,55,55);mg.addColorStop(0,'rgba(240,235,210,1)');mg.addColorStop(.3,'rgba(200,195,170,.3)');mg.addColorStop(1,'transparent');x.fillStyle=mg;x.beginPath();x.arc(500,55,55,0,Math.PI*2);x.fill();x.fillStyle='#eeeacc';x.beginPath();x.arc(500,55,14,0,Math.PI*2);x.fill();
    // Buildings
    for(let i=0;i<35;i++){const bx=i*20+(Math.random()-.5)*10;const h=30+Math.random()*130;const w=8+Math.random()*20;x.fillStyle=['#06060f','#0a0a1a','#0e0e22'][Math.floor(Math.random()*3)];x.fillRect(bx,320-h,w,h);
    for(let wy=320-h+4;wy<316;wy+=6)for(let wx=bx+2;wx<bx+w-2;wx+=4)if(Math.random()>.3){x.fillStyle=(Math.random()>.6?'#ffcc44':'#aabbff')+Math.floor(40+Math.random()*80).toString(16).padStart(2,'0');x.fillRect(wx,wy,2,3)}}
    return new THREE.CanvasTexture(c);
}

// ==================== MATERIALS (COLORFUL!) ====================
const floorMat = new THREE.MeshStandardMaterial({map:woodTex('#B89B72','#CCAE88',6),roughness:.65,metalness:.03});
const deskMat = new THREE.MeshStandardMaterial({color:0xf0ece5,roughness:.4,metalness:.02}); // White/cream desk
const wallMat = new THREE.MeshStandardMaterial({color:0xe8e4dd,roughness:.92,metalness:0});
const metalMat = new THREE.MeshStandardMaterial({color:0x888890,roughness:.25,metalness:.85}); // Silver metal
const darkMetal = new THREE.MeshStandardMaterial({color:0x444448,roughness:.3,metalness:.8});
const chairBlack = new THREE.MeshStandardMaterial({color:0x222228,roughness:.85,metalness:.02});
const chairTeal = new THREE.MeshStandardMaterial({color:0x00aacc,roughness:.6,metalness:.05}); // TEAL accents!
const chairTealBright = new THREE.MeshStandardMaterial({color:0x00ddff,emissive:new THREE.Color(0x00bbdd),emissiveIntensity:.15,roughness:.5,metalness:.1});
const pcWhiteMat = new THREE.MeshStandardMaterial({color:0xe0e0e8,roughness:.35,metalness:.15}); // White PC case
const bezelMat = new THREE.MeshStandardMaterial({color:0x2a2a30,roughness:.35,metalness:.3}); // Dark gray bezels
const kbDarkMat = new THREE.MeshStandardMaterial({color:0x252530,roughness:.4,metalness:.2});
const whitePlastic = new THREE.MeshStandardMaterial({color:0xe8e8ee,roughness:.35,metalness:.1});

// ==================== ROOM ====================
// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(6,5), floorMat);
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
// Ceiling
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(6,5), new THREE.MeshStandardMaterial({color:0xeae7e2,roughness:.95}));
ceil.rotation.x=Math.PI/2; ceil.position.y=3; ceil.receiveShadow=true; scene.add(ceil);
// Back wall
addM(new THREE.PlaneGeometry(6,3),wallMat,0,1.5,-2.5,false,true);
// Right wall
const rw=addM(new THREE.PlaneGeometry(5,3),wallMat,3,1.5,0,false,true); rw.rotation.y=-Math.PI/2;
// Left wall segments (window hole)
[{w:5,h:.8,y:.4},{w:5,h:.8,y:2.6},{w:1.5,h:1.4,y:1.5,z:-1.75},{w:1.5,h:1.4,y:1.5,z:1.75}].forEach(p=>{
    const m=addM(new THREE.PlaneGeometry(p.w,p.h),wallMat,-3,p.y,p.z||0,false,true);m.rotation.y=Math.PI/2;
});
// Window frame
const frameMat=new THREE.MeshStandardMaterial({color:0x555555,roughness:.35,metalness:.5});
addM(rBox(.05,1.5,2.1,.015),frameMat,-2.98,1.5,0,false,false);
addM(rBox(.04,1.4,.025,.008),frameMat,-2.97,1.5,0,false,false);
addM(rBox(.04,.025,2,.008),frameMat,-2.97,1.5,0,false,false);
// Skyline
const sky=new THREE.Mesh(new THREE.PlaneGeometry(2.2,1.5),new THREE.MeshBasicMaterial({map:cityTex()}));
sky.rotation.y=Math.PI/2;sky.position.set(-3.2,1.5,0);scene.add(sky);
// Window glass
const wg=new THREE.Mesh(new THREE.PlaneGeometry(2,1.4),new THREE.MeshPhysicalMaterial({color:0x4466aa,transparent:true,opacity:.06,roughness:0,metalness:.3,side:THREE.DoubleSide}));
wg.rotation.y=Math.PI/2;wg.position.set(-2.96,1.5,0);scene.add(wg);

// ==================== DESK (white/cream - VISIBLE) ====================
const DY=0.74, DZ=-1.9;
const deskTop=tag(addM(rBox(1.85,.04,.82,.015),deskMat,0,DY,DZ),'Standing Desk','White laminate desktop with cable management');
// Metal legs (silver, visible)
const fM=metalMat;
[[-0.85,-0.32],[-0.85,0.32],[0.85,-0.32],[0.85,0.32]].forEach(([lx,lz])=>addM(rBox(.05,DY-.04,.05,.012),fM,lx,DY/2,DZ+lz));
addM(rBox(.05,.05,.68,.012),fM,-0.85,.025,DZ);
addM(rBox(.05,.05,.68,.012),fM,0.85,.025,DZ);
// Cable tray
addM(rBox(.6,.03,.08,.01),darkMetal,0,DY-.06,DZ-.1);

// ==================== MONITORS (bright screens!) ====================
const MY=DY+.38, MZ=DZ-.22;
function makeMon(mx,scrMat,name,desc){
    // Stand neck (thick, dark)
    const neck=new THREE.Mesh(rBox(.04,.22,.04,.01),darkMetal);
    neck.position.set(mx,DY+.14,MZ);neck.castShadow=true;scene.add(neck);
    // V-shaped stand base (like reference)
    const baseMat=new THREE.MeshStandardMaterial({color:0x444448,roughness:.25,metalness:.8});
    const baseL=new THREE.Mesh(rBox(.12,.012,.04,.006),baseMat);
    baseL.position.set(mx-.05,DY+.006,MZ+.03);baseL.rotation.y=-.4;baseL.castShadow=true;scene.add(baseL);
    const baseR=new THREE.Mesh(rBox(.12,.012,.04,.006),baseMat);
    baseR.position.set(mx+.05,DY+.006,MZ+.03);baseR.rotation.y=.4;baseR.castShadow=true;scene.add(baseR);
    // Center join
    const baseC=new THREE.Mesh(rBox(.04,.015,.05,.008),baseMat);
    baseC.position.set(mx,DY+.008,MZ);baseC.castShadow=true;scene.add(baseC);
    // Monitor body (dark gray, not black)
    const bz=addM(rBox(.58,.36,.025,.012),bezelMat,mx,MY,MZ-.01);
    tag(bz,name,desc);
    // Screen plane - VERY bright emissive
    const scr=new THREE.Mesh(new THREE.PlaneGeometry(.55,.33),scrMat);
    scr.position.set(mx,MY,MZ+.004);scene.add(scr);
    return bz;
}

const vsTex=vscodeScreen();
const vsMatl=new THREE.MeshBasicMaterial({map:vsTex}); // BasicMaterial = always full brightness!
const tmTex=termScreen();
const tmMatl=new THREE.MeshBasicMaterial({map:tmTex}); // BasicMaterial = always visible!

makeMon(-.32,vsMatl,'Left Monitor','27" 4K \u2013 VS Code with React + Three.js project');
makeMon(.32,tmMatl,'Right Monitor','27" 4K \u2013 Terminal with dev server running');

// Screen glow lights

const mGR=new THREE.PointLight(0x22cc66,.25,1.2);mGR.position.set(.32,MY,MZ+.15);scene.add(mGR);

// ==================== KEYBOARD (dark gray + RGB-lit keys) ====================
const KY=DY+.02, KZ=DZ+.18;
const kbBody=tag(addM(rBox(.4,.014,.14,.008),kbDarkMat,0,KY,KZ),'Mechanical Keyboard','Custom with tactile switches and per-key RGB');

}}
const kbRGB=new THREE.PointLight(0x00ff88,.25,.4);kbRGB.position.set(0,DY+.005,KZ);scene.add(kbRGB);

// ==================== MOUSE (white, visible) ====================
addM(rBox(.26,.004,.22,.015),new THREE.MeshStandardMaterial({color:0x111114,roughness:.85}),0.34,DY+.003,KZ+.02,false,true);
const mouseM=new THREE.Mesh(new THREE.CapsuleGeometry(.02,.04,12,20),whitePlastic);
mouseM.rotation.set(Math.PI/2,0,Math.PI/2);mouseM.position.set(.34,DY+.022,KZ+.02);mouseM.castShadow=true;scene.add(mouseM);
tag(mouseM,'Gaming Mouse','Lightweight wireless \u2013 white edition');
// Scroll wheel
const sw=new THREE.Mesh(new THREE.CylinderGeometry(.004,.004,.012,12),darkMetal);sw.rotation.z=Math.PI/2;sw.position.set(.34,DY+.038,KZ+.01);scene.add(sw);
// Mouse RGB
const mouseRGB=addM(rBox(.004,.003,.025,.001),new THREE.MeshStandardMaterial({color:0x00ff88,emissive:new THREE.Color(0x00ff88),emissiveIntensity:.6}),.34,DY+.038,KZ+.025);

    // RGB ring (bright!)
    grp.add(new THREE.Mesh(new THREE.TorusGeometry(.052,.005,10,36),new THREE.MeshStandardMaterial({color,emissive:new THREE.Color(color),emissiveIntensity:.8,roughness:.2})));

    grp.add(new THREE.Mesh(new THREE.TorusGeometry(.02,.003,8,20),new THREE.MeshStandardMaterial({color,emissive:new THREE.Color(color),emissiveIntensity:.5,roughness:.3})));

    for(let i=0;i<9;i++){const a=(i/9)*Math.PI*2;const b=new THREE.Mesh(new THREE.CapsuleGeometry(.004,.04,4,8),new THREE.MeshStandardMaterial({color,emissive:new THREE.Color(color),emissiveIntensity:.25,transparent:true,opacity:.55}));b.rotation.z=a;b.position.set(Math.cos(a)*.015,Math.sin(a)*.015,0);bg.add(b)}
    grp.add(bg);

    grp.add(new THREE.PointLight(color,.2,.5));
    grp.position.set(fx,fy,fz);grp.rotation.y=Math.PI/2;scene.add(grp);fans.push(bg);
}

// ==================== ANIMATION ====================
function animate(){
    requestAnimationFrame(animate);
    const t=clock.getElapsedTime();
    // Fans
    fans.forEach((b,i)=>{b.rotation.z+=.07+i*.015});
    // RGB cycling
    const h1=(t*.1)%1,h2=(t*.1+.5)%1;
    const lc=new THREE.Color().setHSL(h1,1,.5);
    ledMat.color.copy(lc);ledMat.emissive.copy(lc);
    ledL1.color.setHSL(h1,1,.5);ledL2.color.setHSL(h2,1,.5);
    kbRGB.color.setHSL((t*.15)%1,1,.5);
    pcGlow.color.setHSL((t*.08)%1,.8,.5);
    const mc=new THREE.Color().setHSL((t*.12)%1,1,.5);
    mouseRGB.material.color.copy(mc);mouseRGB.material.emissive.copy(mc);
    // Screen glow pulse
    mGL.intensity=.25+Math.sin(t*1.5)*.05;
    mGR.intensity=.2+Math.sin(t*1.8)*.04;
    // Dust
    const pos=pG.attributes.position.array;
    for(let i=0;i<PC2;i++){const i3=i*3;pos[i3]+=pV[i].x;pos[i3+1]+=pV[i].y+Math.sin(t+i)*.00002;pos[i3+2]+=pV[i].z;
    if(pos[i3]>2.9)pos[i3]=-2.9;if(pos[i3]<-2.9)pos[i3]=2.9;if(pos[i3+1]>2.9)pos[i3+1]=.1;if(pos[i3+1]<.1)pos[i3+1]=2.9;if(pos[i3+2]>2.4)pos[i3+2]=-2.4;if(pos[i3+2]<-2.4)pos[i3+2]=2.4}
    pG.attributes.position.needsUpdate=true;
    pMat2.opacity=.22+Math.sin(t*.6)*.08;
    // MacBook lid opening animation
    if (macLoaded) {
        const elapsed = t - macLoadTime;
        if (elapsed > 1.5) {
            macLidAngle += (macLidTarget - macLidAngle) * 0.025;
            if (Math.abs(macLidAngle - macLidTarget) < 0.002) macLidAngle = macLidTarget;
            macLidGroup.rotation.x = macLidAngle;
            const openPct = 1 - (macLidAngle - macLidTarget) / (Math.PI * 0.5 - macLidTarget);
            if (openPct > 0.6) {
                const fade = Math.min(0.96, (openPct - 0.6) / 0.3 * 0.96);
                macScreenMat.opacity = fade;
                if (macScreenLight) macScreenLight.intensity = fade * 0.2;
            }
        }
    }
    // Hover
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObjects(interactives);
    if(hits.length>0){const o=hits[0].object;
        if(hovered!==o){if(hovered)hovered.material.emissiveIntensity=origEmissive;hovered=o;origEmissive=o.material.emissiveIntensity||0;
        if(!o.material.emissive||(!o.material.emissive.r&&!o.material.emissive.g&&!o.material.emissive.b))o.material.emissive=new THREE.Color(0x336699);
        o.material.emissiveIntensity=origEmissive+.2}
        document.body.style.cursor='pointer';tipN.textContent=o.userData.name;tipD.textContent=o.userData.desc;tip.style.display='block';
    }else{if(hovered)hovered.material.emissiveIntensity=origEmissive;hovered=null;document.body.style.cursor='default';tip.style.display='none'}
    controls.update();
    composer.render();
}
animate();

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight)});
    </script>
</body>
